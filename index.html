<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Curso Sistema de Salud Privado - Dra. Claudia Marrero Perez</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C9A84C;--gold-light:#E8C76A;--dark:#0B1120;--dark2:#131D30;--teal-light:#22B0AE;--white:#FFFFFF;--gray:#8A94A6}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--white);overflow-x:hidden}
.top-strip{background:var(--gold);text-align:center;padding:10px 20px;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dark)}
.hero{position:relative;text-align:center;padding:64px 20px 56px;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(201,168,76,0.18) 0%,transparent 70%),var(--dark);overflow:hidden}
.hero-deco{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.hero-deco svg{position:absolute;opacity:0.05}
.hero-deco svg:first-child{top:-10%;right:-4%;width:420px}
.hero-deco svg:last-child{bottom:-10%;left:-4%;width:320px}
.hero-inner{position:relative;max-width:820px;margin:0 auto}
.badge{display:inline-flex;align-items:center;gap:8px;background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.4);border-radius:50px;padding:6px 18px;font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:28px}
.badge-dot{width:6px;height:6px;background:var(--gold);border-radius:50%;display:inline-block}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(34px,5.5vw,64px);font-weight:900;line-height:1.1;margin-bottom:20px}
.hero h1 .accent{color:var(--gold)}
.hero-subtitle{font-size:clamp(15px,2vw,18px);color:#BFC8D8;line-height:1.7;max-width:620px;margin:0 auto 36px}
.cta-wrap{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:16px}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--dark);font-weight:700;font-size:15px;padding:16px 40px;border-radius:6px;text-decoration:none;display:inline-block;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 24px rgba(201,168,76,0.35);text-transform:uppercase;letter-spacing:1px}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(201,168,76,0.5)}
.spots-pill{display:inline-flex;align-items:center;gap:8px;background:rgba(220,50,50,0.12);border:1px solid rgba(220,50,50,0.4);border-radius:50px;padding:8px 18px;font-size:13px;font-weight:700;color:#F87171}
.spots-pill::before{content:'';width:8px;height:8px;background:#EF4444;border-radius:50%;animation:pulse 1.4s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.5)}}
.video-section{padding:0 20px 60px;background:var(--dark)}
.video-wrapper{max-width:820px;margin:0 auto;position:relative;border-radius:14px;overflow:hidden;box-shadow:0 20px 70px rgba(0,0,0,0.65);border:1px solid rgba(201,168,76,0.22);background:#000;aspect-ratio:16/9}
.video-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#0B1120 0%,#1A2540 100%);cursor:pointer}
.play-btn{width:80px;height:80px;background:linear-gradient(135deg,var(--gold),var(--gold-light));border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 0 0 14px rgba(201,168,76,0.1),0 0 0 28px rgba(201,168,76,0.05);transition:transform .2s}
.play-btn:hover{transform:scale(1.08)}
.play-btn svg{margin-left:5px}
